# Faithfulness-measurement, abstention, and output settings.

signals:
  weights: {a: 0.4, b: 0.3, c: 0.3}   # heuristic FS fusion (verifier's fallback)
  consistency:
    n_samples: 5
    temperature: 0.7
  iou_grounded_threshold: 0.30        # weak-label cut for Signal B validation

abstention:
  alpha: 0.05          # target error rate on retained (answered) cases
  delta: 0.05          # guarantee failure probability over the calibration draw

outputs:
  dir: fmr/outputs
  figures_dir: fmr/outputs/figures
  seed: 42
